<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QQ — Developer Tools</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%2358a6ff'/></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg: #0a0c10;
            --bg-glow: #0d1117;
            --surface: rgba(22, 27, 34, 0.6);
            --border: rgba(48, 54, 61, 0.5);
            --text: #e6edf3;
            --text-secondary: #7d8590;
            --accent: #58a6ff;
            --accent-glow: rgba(88, 166, 255, 0.3);
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }
        
        /* Animated gradient background */
        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(88, 166, 255, 0.15), transparent),
                radial-gradient(ellipse 60% 40% at 80% 80%, rgba(35, 134, 54, 0.1), transparent),
                radial-gradient(ellipse 50% 30% at 20% 100%, rgba(139, 92, 246, 0.08), transparent);
            pointer-events: none;
            z-index: -1;
        }
        
        /* Floating particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: -1;
            overflow: hidden;
        }
        
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--accent);
            border-radius: 50%;
            opacity: 0;
            animation: float 15s infinite;
        }
        
        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }
        
        /* Main content */
        .container {
            text-align: center;
            padding: 40px 24px;
            max-width: 600px;
            animation: fadeInUp 0.8s ease-out;
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Avatar */
        .avatar {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--accent), #238636);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 32px;
            font-size: 36px;
            box-shadow: 0 20px 40px rgba(88, 166, 255, 0.2);
            animation: pulse 4s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        /* Typography */
        h1 {
            font-size: clamp(36px, 8vw, 56px);
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .tagline {
            font-size: 18px;
            color: var(--text-secondary);
            font-weight: 400;
            margin-bottom: 8px;
        }
        
        .subtitle {
            font-size: 15px;
            color: var(--text-secondary);
            margin-bottom: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .subtitle a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
            transition: opacity 0.2s;
        }
        
        .subtitle a:hover {
            opacity: 0.8;
        }
        
        /* CTA Button */
        .cta-button {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 18px 36px;
            background: linear-gradient(135deg, var(--accent), #1f6feb);
            border: none;
            border-radius: 100px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 24px var(--accent-glow);
            position: relative;
            overflow: hidden;
        }
        
        .cta-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }
        
        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px var(--accent-glow);
        }
        
        .cta-button:hover::before {
            left: 100%;
        }
        
        .cta-button svg {
            width: 20px;
            height: 20px;
            transition: transform 0.3s;
        }
        
        .cta-button:hover svg {
            transform: translateX(4px);
        }
        
        /* Stats */
        .stats {
            display: flex;
            justify-content: center;
            gap: 48px;
            margin-top: 64px;
            padding-top: 48px;
            border-top: 1px solid var(--border);
        }
        
        .stat {
            text-align: center;
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--text);
            display: block;
        }
        
        .stat-label {
            font-size: 13px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 4px;
        }
        
        /* Footer */
        footer {
            margin-top: 48px;
            text-align: center;
            color: var(--text-secondary);
            font-size: 13px;
        }
        
        footer a {
            color: var(--accent);
            text-decoration: none;
        }
        
        /* Responsive */
        @media (max-width: 640px) {
            body {
                justify-content: flex-start;
                padding: 40px 0;
            }
            .container {
                padding: 24px;
            }
            .stats {
                gap: 32px;
            }
            .stat-value {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="particles" id="particles"></div>
    
    <main class="container">
        <div class="avatar">🛠️</div>
        <h1>QQ</h1>
        <p class="tagline">Building tools with AI</p>
        <p class="subtitle">
            Assisted by <a href="https://qqshi13.github.io/nova/">Nova ☄️</a>
        </p>
        
        <a href="/projects" class="cta-button">
            View All Projects
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="5" y1="12" x2="19" y2="12"></line>
                <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
        </a>
        
        <div class="stats">
            <div class="stat">
                <span class="stat-value">13</span>
                <span class="stat-label">Tools</span>
            </div>
            <div class="stat">
                <span class="stat-value">100%</span>
                <span class="stat-label">Free</span>
            </div>
            <div class="stat">
                <span class="stat-value">∞</span>
                <span class="stat-label">Possibilities</span>
            </div>
        </div>
    </main>
    
    <footer>
        <p>Built with ❤️ & <a href="https://openclaw.ai">OpenClaw</a></p>
    </footer>
    
    <script>
        // Create floating particles
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 20; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 15 + 's';
            particle.style.animationDuration = (10 + Math.random() * 10) + 's';
            particlesContainer.appendChild(particle);
        }
    </script>
</body>
</html>
