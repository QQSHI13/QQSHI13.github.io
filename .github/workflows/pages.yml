name: Deploy to GitHub Pages


on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install DocsForge
        run: pip install docsforge

      - name: Build blog with DocsForge
        run: docsforge build

      - name: Copy static HTML files (preserve non-blog pages)
        run: |
          # Copy all static HTML files from docs/ to site/
          # This preserves homepage, projects, and other non-blog pages
          cp docs/index.html site/index.html
          cp docs/projects.html site/projects.html
          cp docs/24.html site/24.html
          cp docs/404.html site/404.html
          cp docs/web-sync.html site/web-sync.html

      - name: Copy other static assets
        run: |
          cp docs/manifest.json site/manifest.json
          cp docs/robots.txt site/robots.txt
          cp docs/sitemap.xml site/sitemap.xml
          cp docs/sw.js site/sw.js

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: 'site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
