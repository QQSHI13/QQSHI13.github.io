site_name: QQ's Blog
site_url: https://qqshi13.github.io
site_author: QQ

nav:
  - Home: index.md
  - Blog: blog/

repo_url: https://github.com/QQSHI13/QQSHI13.github.io
repo_name: QQSHI13/QQSHI13.github.io

theme:
  name: material
  favicon: assets/favicon.png
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - blog:
      blog_dir: blog
      post_date_format: long
      archive_date_format: MMMM YYYY
      categories_allowed:
        - tutorial
        - workflow
        - hardware
        - story
      pagination_per_page: 10
  - tags

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/QQSHI13
    - icon: fontawesome/solid/rss
      link: https://qqshi13.github.io/blog/feed_rss_created.xml

copyright: Copyright &copy; 2026 QQ — GPL-3.0
