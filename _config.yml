
title: QQ's Blog
email: shizheng327@gmail.com
description: >-
  Daily thoughts, tutorials, and project updates from a 12-year-old developer
  building web tools, desktop apps, and hardware projects.

baseurl: ""  # Empty for user site (qqshi13.github.io)
url: "https://qqshi13.github.io"
author: "QQ"

# Profile
birth_year: 2013

# Social
twitter_username: QQSHI13
github_username: QQSHI13

# Build settings
markdown: kramdown
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-paginate

# Feed settings (jekyll-feed)
feed:
  path: blog/feed.xml
  posts_limit: 20

# Pagination settings (jekyll-paginate)
paginate: 5
paginate_path: "/blog/page:num/"

# Daily blog settings
show_excerpts: true
excerpt_separator: <!--more-->

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "QQ"

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - TEMPLATE.md
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - .sass-cache/
  - .jekyll-cache/
  - .jekyll-metadata
