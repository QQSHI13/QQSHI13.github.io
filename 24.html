<!DOCTYPE html>
<html>
<head>
 <title>24点解法计算器</title>
 <meta charset="utf-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;500&display=swap" rel="stylesheet">
 <style>
 :root {
 --primary: #4A90E2;
 --secondary: #6C5CE7;
 --background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
 --container-bg: rgba(30, 30, 50, 0.95);
 --text-color: #e6e6e6;
 --text-secondary: #a0a0a0;
 --input-bg: #252540;
 --input-border: #3a3a5c;
 --result-bg: #252540;
 --solution-bg: #1e1e35;
 }

 * {
 box-sizing: border-box;
 margin: 0;
 padding: 0;
 }

 body {
 font-family: 'Roboto', sans-serif;
 min-height: 100vh;
 background: var(--background);
 display: flex;
 flex-direction: column;
 align-items: center;
 padding: 2rem;
 color: var(--text-color);
 }

 .container {
 background: var(--container-bg);
 padding: 2rem;
 border-radius: 20px;
 box-shadow: 0 10px 30px rgba(0,0,0,0.3);
 width: 100%;
 max-width: 600px;
 transition: transform 0.3s ease;
 }

 h2 {
 color: var(--text-color);
 text-align: center;
 margin-bottom: 1.5rem;
 font-weight: 500;
 font-size: 2.2rem;
 }

 .input-group {
 display: grid;
 grid-template-columns: repeat(4, 1fr);
 gap: 1rem;
 margin: 2rem 0;
 }

 input {
 width: 100%;
 padding: 1rem;
 border: 2px solid var(--input-border);
 border-radius: 12px;
 font-size: 1.2rem;
 text-align: center;
 transition: all 0.3s ease;
 background: var(--input-bg);
 color: var(--text-color);
 }

 input:focus {
 outline: none;
 border-color: var(--primary);
 box-shadow: 0 0 10px rgba(74, 144, 226, 0.3);
 }

 input::placeholder {
 color: var(--text-secondary);
 }

 .button-group {
 display: grid;
 grid-template-columns: 1fr 1fr;
 gap: 1rem;
 margin-bottom: 1rem;
 }

 button {
 width: 100%;
 padding: 1rem;
 background: linear-gradient(45deg, var(--primary), var(--secondary));
 color: white;
 border: none;
 border-radius: 12px;
 font-size: 1.1rem;
 cursor: pointer;
 transition: all 0.3s ease;
 text-transform: uppercase;
 letter-spacing: 1px;
 }

 button:hover {
 transform: translateY(-2px);
 box-shadow: 0 5px 15px rgba(108, 92, 231, 0.4);
 }

 button.secondary {
 background: linear-gradient(45deg, #2d3436, #636e72);
 }

 button.secondary:hover {
 box-shadow: 0 5px 15px rgba(99, 110, 114, 0.4);
 }

 #result {
 margin-top: 2rem;
 padding: 1.5rem;
 background: var(--result-bg);
 border-radius: 12px;
 line-height: 1.6;
 color: var(--text-color);
 }

 .solution-item {
 padding: 0.8rem;
 margin: 0.5rem 0;
 background: var(--solution-bg);
 border-radius: 8px;
 box-shadow: 0 2px 5px rgba(0,0,0,0.2);
 animation: fadeIn 0.5s ease;
 color: var(--text-color);
 }

 .solution-item.error {
 color: #ff6b6b;
 }

 @keyframes fadeIn {
 from { opacity: 0; transform: translateY(10px); }
 to { opacity: 1; transform: translateY(0); }
 }

 @media (max-width: 480px) {
 .container {
 padding: 1.5rem;
 }
 .input-group {
 grid-template-columns: repeat(2, 1fr);
 }
 .button-group {
 grid-template-columns: 1fr;
 }
 }
 </style>
</head>
<body>
 <div class="container">
 <h2>🎮 24点游戏解法计算器</h2>
 <div class="input-group">
 <input type="number" id="num1" placeholder="数字" required min="1" max="13">
 <input type="number" id="num2" placeholder="数字" required min="1" max="13">
 <input type="number" id="num3" placeholder="数字" required min="1" max="13">
 <input type="number" id="num4" placeholder="数字" required min="1" max="13">
 </div>
 <div class="button-group">
 <button onclick="calculate()">立即计算</button>
 <button class="secondary" onclick="generateProblem()">🎲 生成题目</button>
 </div>
 <div id="result"></div>
 </div>

 <script>
 function permute(arr) {
 if (arr.length <= 1) return [arr];
 const result = [];
 for (let i = 0; i < arr.length; i++) {
 const current = arr[i];
 const remaining = [...arr.slice(0, i), ...arr.slice(i + 1)];
 const perms = permute(remaining);
 for (const p of perms) {
 result.push([current, ...p]);
 }
 }
 return result;
 }
 
 function* product(...arrays) {
 if (arrays.length === 0) yield [];
 else {
 for (const head of arrays[0]) {
 for (const tail of product(...arrays.slice(1))) {
 yield [head, ...tail];
 }
 }
 }
 }
 
 const structures = [
 (a, b, c, d, op1, op2, op3) => `(${a} ${op1} ${b}) ${op2} (${c} ${op3} ${d})`,
 (a, b, c, d, op1, op2, op3) => `((${a} ${op1} ${b}) ${op2} ${c}) ${op3} ${d}`,
 (a, b, c, d, op1, op2, op3) => `(${a} ${op1} (${b} ${op2} ${c})) ${op3} ${d}`,
 (a, b, c, d, op1, op2, op3) => `${a} ${op1} ((${b} ${op2} ${c}) ${op3} ${d})`,
 (a, b, c, d, op1, op2, op3) => `${a} ${op1} (${b} ${op2} (${c} ${op3} ${d}))`
 ];
 
 const operators = ['+', '-', '*', '/'];
 
 function evaluate(expr) {
 try {
 const result = Function('"use strict"; return (' + expr + ')')();
 return Math.abs(result - 24) < 0.0001 ? 24 : result;
 } catch (e) {
 return null;
 }
 }
 
 function find24Solutions(numbers) {
 const solutions = new Set();
 const perms = permute(numbers);
 
 for (const perm of perms) {
 const [a, b, c, d] = perm;
 for (const op1 of operators) {
 for (const op2 of operators) {
 for (const op3 of operators) {
 for (const struct of structures) {
 const expr = struct(a, b, c, d, op1, op2, op3);
 if (evaluate(expr) === 24) {
 solutions.add(expr);
 }
 }
 }
 }
 }
 }
 
 return Array.from(solutions);
 }
 
 function hasSolution(numbers) {
 return find24Solutions(numbers).length > 0;
 }
 
 function generateProblem() {
 const resultDiv = document.getElementById('result');
 resultDiv.innerHTML = '<div class="solution-item">🎲 正在生成有解的题目...</div>';
 
 setTimeout(() => {
 let numbers;
 let attempts = 0;
 const maxAttempts = 1000;
 
 do {
 numbers = [
 Math.floor(Math.random() * 13) + 1,
 Math.floor(Math.random() * 13) + 1,
 Math.floor(Math.random() * 13) + 1,
 Math.floor(Math.random() * 13) + 1
 ];
 attempts++;
 } while (!hasSolution(numbers) && attempts < maxAttempts);
 
 document.getElementById('num1').value = numbers[0];
 document.getElementById('num2').value = numbers[1];
 document.getElementById('num3').value = numbers[2];
 document.getElementById('num4').value = numbers[3];
 
 if (attempts >= maxAttempts) {
 resultDiv.innerHTML = '<div class="solution-item error">⚠️ 生成失败，请重试</div>';
 } else {
 resultDiv.innerHTML = `<div class="solution-item">🎯 题目已生成：${numbers.join(', ')}<br><br>💡 点击"立即计算"查看答案</div>`;
 }
 }, 50);
 }
 
 function calculate() {
 const nums = [
 parseInt(document.getElementById('num1').value),
 parseInt(document.getElementById('num2').value),
 parseInt(document.getElementById('num3').value),
 parseInt(document.getElementById('num4').value)
 ];
 
 const resultDiv = document.getElementById('result');
 resultDiv.innerHTML = '';
 
 if (nums.some(isNaN)) {
 resultDiv.innerHTML = '<div class="solution-item error">⚠️ 请输入四个有效整数</div>';
 return;
 }

 resultDiv.innerHTML = '<div class="solution-item">🔍 计算中，请稍候...</div>';
 
 setTimeout(() => {
 const solutions = find24Solutions(nums);
 resultDiv.innerHTML = solutions.length > 0 
 ? '<strong>🎉 找到的解法：</strong>' + 
 solutions.map((sol, idx) => `<div class="solution-item">${idx+1}. ${sol}</div>`).join('')
 : '<div class="solution-item">😞 未能找到有效解法</div>';
 }, 50);
 }
 </script>
</body>
</html>
